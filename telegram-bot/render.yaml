# Free-tier friendly Render Blueprint:
# 1) Push telegram-bot/ to a repo (or monorepo root = this folder)
# 2) Create Web Service → "Deploy from Blueprint" OR new Background Worker
# 3) Set env: TELEGRAM_BOT_TOKEN, DEEPSEEK_API_KEY, CLINIC_SITE_URL, etc.
services:
  - type: worker
    name: azimut-clinic-telegram-bot
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: CLINIC_SITE_URL
        value: https://azimutclinic.ru/
      - key: CLINIC_NAME
        value: Азимут Клиник
      - key: CLINIC_PHONE
        value: "+79251127799"
